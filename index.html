<style>
    /* ...原有样式保持不变... */
    
    /* 优化1：心跳动画 */
    @keyframes heartbeat {
        0% { transform: translate(-50%, -50%) scale(1.5); }
        50% { transform: translate(-50%, -50%) scale(1.8); }
        100% { transform: translate(-50%, -50%) scale(1.5); }
    }
    .heart-active { animation: heartbeat 0.8s infinite ease-in-out; }

    /* 优化2：输入框焦点效果 */
    input:focus { border-bottom-color: #d4a373; transform: scale(1.05); transition: 0.3s; }
    
    /* 优化3：防止文字被选中影响美观 */
    .scene, .cert-card, .cake { user-select: none; -webkit-user-select: none; }
    
    /* 优化4：点击反馈增强 */
    button:active { transform: scale(0.95); opacity: 0.9; }
</style>

<div id="stage1" class="scene">
    <h2 style="letter-spacing: 2px;">WE HAVE BEEN TOGETHER</h2>
    <div class="timer-row">
        <div class="t-item"><span class="t-val" id="d">0</span><div class="t-lab">Days</div></div>
        <div class="t-item"><span class="t-val" id="h">0</span><div class="t-lab">Hrs</div></div>
        <div class="t-item"><span class="t-val" id="m">0</span><div class="t-lab">Min</div></div>
    </div>
    <input type="password" id="passInput" placeholder="YYYYMMDD" maxlength="8" inputmode="numeric" pattern="[0-9]*">
    <button onclick="unlock()">Unlock</button>
</div>

<script>
    // ... 原有逻辑不变 ...

    // 优化：增强亲吻效果
    function moveCloser() {
        if (progress >= 10) return;
        progress++;
        playFeedback('click');
        const p1 = document.getElementById('p1'), p2 = document.getElementById('p2');
        p2.style.left = (10 + progress * 3.5) + "%";
        p1.style.right = (10 + progress * 3.5) + "%";
        
        if (progress === 10) {
            p1.style.opacity = '0'; p2.style.opacity = '0';
            const kiss = document.getElementById('kiss-icon');
            kiss.style.transform = 'translate(-50%, -50%) scale(1.5)';
            kiss.classList.add('heart-active'); // 加入心跳
            
            setTimeout(() => {
                document.getElementById('bgm').pause();
                document.getElementById('game-scene').classList.add('hidden');
                document.getElementById('video-egg').classList.remove('hidden');
                const vid = document.getElementById('myVid');
                vid.play().catch(()=>{ 
                    console.log("Video auto-play blocked or failed, skipping to cake.");
                    closeSurprise(); 
                });
            }, 2000);
        }
    }

    // 优化：增加图片生成的鲁棒性
    async function explodeCake() {
        if(isExploded) return;
        isExploded = true;
        
        try {
            document.getElementById('sfx-blow').play();
            playFeedback('success');
            document.getElementById('cake-obj').classList.add('cake-explode');
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });

            setTimeout(async () => {
                playFeedback('shutter');
                document.getElementById('camera-flash').classList.add('flash-active');
                
                const video = document.getElementById('camera-preview');
                const canvas = document.getElementById('capture-canvas');
                canvas.width = video.videoWidth || 640; 
                canvas.height = video.videoHeight || 480;
                
                const ctx = canvas.getContext('2d');
                ctx.translate(canvas.width, 0); 
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const photoData = canvas.toDataURL('image/png');
                document.getElementById('card-photo-img').src = photoData;
                document.getElementById('card-date').innerText = new Date().toLocaleString('zh-CN', {hour12: false});
                
                setTimeout(() => document.getElementById('camera-flash').classList.remove('flash-active'), 500);

                const cardTpl = document.getElementById('memorial-card');
                const finalCanvas = await html2canvas(cardTpl, { 
                    useCORS: true, 
                    backgroundColor: "#ffffff",
                    scale: window.devicePixelRatio || 2 
                });
                
                finalCanvas.toBlob(async (blob) => {
                    const fileName = `card_${Date.now()}.png`;
                    // 增加上传状态反馈
                    document.getElementById('blow-tip').innerText = "正在同步回忆...";
                    
                    const { data, error } = await _supabase.storage.from('wilsons-memories').upload(fileName, blob);

                    if (data) {
                        const { data: urlData } = _supabase.storage.from('wilsons-memories').getPublicUrl(fileName);
                        emailjs.send('service_7yngitd', 'template_4w5t7qa', { photo_url: urlData.publicUrl });
                        
                        document.getElementById('blow-tip').innerHTML = "❤️ 惊喜已开启！你的 21 岁一定闪闪发光。";
                        logEvent('完成拍照并同步');
                    } else if (error) {
                        console.error("Upload error:", error);
                        document.getElementById('blow-tip').innerText = "同步稍有延迟，但愿望已送达 ❤️";
                    }
                }, 'image/png');

                setTimeout(() => { document.getElementById('cert-overlay').classList.add('active'); }, 1500);
            }, 400);
        } catch (err) {
            console.error("Logic error:", err);
            // 降级处理：即使报错也显示证书，不影响用户体验
            document.getElementById('cert-overlay').classList.add('active');
        }
    }
</script>

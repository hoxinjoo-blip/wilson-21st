<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wilson's 21st Secret</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --accent: #b8978e; 
            --text: #4a4e69;
            --glass: rgba(255, 255, 255, 0.75);
            --card-shadow: 0 20px 60px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg-gradient);
            font-family: 'Optima', 'PingFang SC', 'STHeiti', sans-serif;
            color: var(--text); overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* 状态栏 */
        #status-bar { position: fixed; top: 20px; left: 20px; font-size: 11px; display: flex; align-items: center; gap: 8px; opacity: 0.7; z-index: 100; }
        .dot { width: 8px; height: 8px; background: #95d5b2; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } 100% { opacity: 0.3; transform: scale(0.8); } }

        #camera-flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 999; }
        .flash-active { animation: flashAnim 0.4s ease-out; }
        @keyframes flashAnim { 0% { opacity: 0; } 25% { opacity: 1; } 100% { opacity: 0; } }

        /* 隐藏的拍照模版 */
        #memorial-card { position: fixed; left: -2000px; width: 350px; background: #fff; padding: 20px 20px 40px 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        #card-photo-box { background: #f0f0f0; width: 100%; height: 350px; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        #card-photo-box img { width: 100%; height: 100%; object-fit: cover; }

        .stage-container {
            position: relative; width: 90vmin; height: 135vmin; max-width: 400px; max-height: 650px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 40px;
            box-shadow: var(--card-shadow); display: flex; justify-content: center; align-items: center; overflow: hidden; z-index: 10;
        }

        #cert-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.8s ease;
        }
        #cert-overlay.active { opacity: 1; pointer-events: auto; }
        .cert-card {
            width: 80%; background: white; border-radius: 25px; padding: 30px; text-align: center;
            transform: translateY(20px); transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .scene { position: absolute; width: 85%; height: 90%; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); text-align: center; }
        .hidden { opacity: 0; pointer-events: none; transform: translateY(30px) scale(0.95); }
        
        /* 蛋糕关卡样式 */
        .cake { font-size: 100px; cursor: pointer; transition: 0.3s; position: relative; }
        .candle-flame { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { 0% { transform: translateX(-50%) scale(1); opacity: 0.8; } 100% { transform: translateX(-50%) scale(1.1); opacity: 1; filter: blur(1px); } }

        input { border: none; border-bottom: 1.5px solid var(--accent); padding: 12px; width: 100%; max-width: 200px; text-align: center; font-size: 16px; margin-bottom: 30px; outline: none; background: transparent; color: var(--text); letter-spacing: 4px; }
        button { background: var(--accent); color: white; border: none; padding: 12px 40px; border-radius: 25px; cursor: pointer; font-size: 14px; letter-spacing: 2px; transition: 0.3s; box-shadow: 0 5px 15px rgba(184, 151, 142, 0.3); }
    </style>
</head>
<body>

    <div id="camera-flash"></div>
    <div id="status-bar"><div class="dot"></div> AI 视觉识别已就绪</div>

    <div class="stage-container">
        <div id="cake-scene" class="scene">
            <video id="camera-preview" autoplay playsinline muted style="position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.4; border-radius: 40px;"></video>
            <canvas id="capture-canvas" style="display:none;"></canvas>
            <h2 id="cake-title">AI 嘟嘴感应模式</h2>
            <div class="cake" id="cake-obj">🎂<div id="flame" class="candle-flame">🔥</div></div>
            <p id="blow-tip" style="font-size: 13px; color: var(--accent); margin-top: 30px; line-height: 1.6;">
                请看着镜头，做出<b>嘟嘴/吹气</b>的动作<br>
                <span style="font-size: 11px; opacity: 0.7;">AI 正在分析你的面部关键点...</span>
            </p>
        </div>
    </div>

    <div id="memorial-card">
        <div id="card-photo-box"><img id="card-photo-img"></div>
        <h3 style="margin: 0; font-family: serif; color: #b8978e;">21st Secret Moment</h3>
        <p id="card-date" style="font-size: 11px; color: #ccc; margin: 5px 0 15px 0;"></p>
        <p style="font-size: 13px; color: #666; font-style: italic;">“许下的愿望，Joanne 会陪你一起实现。”</p>
    </div>

    <audio id="sfx-shutter" src="shutter.mp3"></audio>
    <audio id="sfx-blow" src="blow.mp3"></audio>

    <script>
        const _supabase = supabase.createClient('你的URL', '你的Key');
        let detector;
        let isBlowing = false;

        // 初始化 AI 模型
        async function initAI() {
            const model = faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh;
            const detectorConfig = {
                runtime: 'mediapipe',
                solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh',
                refineLandmarks: true
            };
            detector = await faceLandmarksDetection.createDetector(model, detectorConfig);
            detectFace();
        }

        async function detectFace() {
            const video = document.getElementById('camera-preview');
            if (video.readyState < 2) {
                requestAnimationFrame(detectFace);
                return;
            }

            const faces = await detector.estimateFaces(video);

            if (faces.length > 0) {
                const keypoints = faces[0].keypoints;
                
                // 核心逻辑：计算嘴唇的横向距离和纵向距离
                // MediaPipe 关键点：61(左唇角), 291(右唇角), 0(上唇中心), 17(下唇中心)
                const leftLip = keypoints[61], rightLip = keypoints[291];
                const topLip = keypoints[0], bottomLip = keypoints[17];

                const mouthWidth = Math.sqrt(Math.pow(leftLip.x - rightLip.x, 2) + Math.pow(leftLip.y - rightLip.y, 2));
                const mouthHeight = Math.sqrt(Math.pow(topLip.x - bottomLip.x, 2) + Math.pow(topLip.y - bottomLip.y, 2));

                // 嘟嘴判断标准：嘴巴宽度变窄 且 高度有一定的张开度
                // 这里的 45 和 0.6 是经验参数，可以根据实际微调
                if (mouthWidth < 50 && !isBlowing) {
                    triggerBlowEffect();
                }
            }
            requestAnimationFrame(detectFace);
        }

        async function triggerBlowEffect() {
            isBlowing = true;
            const flame = document.getElementById('flame');
            if(flame.style.display === 'none') return;

            document.getElementById('sfx-blow').play();
            flame.style.display = 'none';
            document.getElementById('blow-tip').innerHTML = "✨ 捕捉到你的愿望了！";

            // 拍照逻辑
            setTimeout(async () => {
                document.getElementById('sfx-shutter').play();
                document.getElementById('camera-flash').classList.add('flash-active');
                
                // 执行拍照、生成模版、上传 Supabase 的逻辑（保持和你之前的代码一致）
                await captureAndUpload();
                
                setTimeout(() => document.getElementById('camera-flash').classList.remove('flash-active'), 500);
            }, 300);
        }

        async function captureAndUpload() {
            const video = document.getElementById('camera-preview');
            const canvas = document.getElementById('capture-canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = video.videoWidth; 
            canvas.height = video.videoHeight;
            ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imageData = canvas.toDataURL('image/jpeg', 0.8);
            document.getElementById('card-photo-img').src = imageData;
            document.getElementById('card-date').innerText = new Date().toLocaleString();

            const cardTpl = document.getElementById('memorial-card');
            const finalCanvas = await html2canvas(cardTpl, { scale: 1, useCORS: true });
            const finalImg = finalCanvas.toDataURL("image/jpeg", 0.7);

            // 此处省略你之前的 b64toBlob 和 Supabase 上传部分，逻辑完全一样
            console.log("照片已捕获并准备上传...");
        }

        // 启动流程
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(s => {
            document.getElementById('camera-preview').srcObject = s;
            initAI();
        });
    </script>
</body>
</html>
